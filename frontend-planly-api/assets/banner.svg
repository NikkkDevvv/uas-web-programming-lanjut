<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="100%" height="100%">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a16" />
      <stop offset="50%" stop-color="#12102e" />
      <stop offset="100%" stop-color="#07070f" />
    </linearGradient>
    <radialGradient id="glow-indigo" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-violet" cx="80%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <linearGradient id="success-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Glassmorphism Filter -->
    <filter id="blur-filter">
      <feGaussianBlur stdDeviation="6" />
    </filter>
  </defs>

  <style>
    /* Global Styles */
    .title-text {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 900;
      font-size: 48px;
      fill: url(#accent-grad);
      filter: drop-shadow(0 2px 8px rgba(99, 102, 241, 0.3));
    }
    .subtitle-text {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 500;
      font-size: 14px;
      fill: #94a3b8;
      letter-spacing: 0.5px;
    }
    .version-badge {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 700;
      font-size: 11px;
      fill: #ffffff;
    }
    .widget-title {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 700;
      font-size: 12px;
      fill: #e2e8f0;
      letter-spacing: 0.5px;
    }
    .widget-value {
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      font-size: 13px;
      fill: #34d399;
    }
    .widget-label {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 500;
      font-size: 10px;
      fill: #64748b;
    }

    /* CSS Keyframe Animations */
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.85; }
    }
    @keyframes laser-move {
      0% { transform: translateY(0px); }
      50% { transform: translateY(70px); }
      100% { transform: translateY(0px); }
    }
    @keyframes wave-scale-1 {
      0%, 100% { transform: scaleY(0.3); }
      50% { transform: scaleY(0.9); }
    }
    @keyframes wave-scale-2 {
      0%, 100% { transform: scaleY(0.4); }
      50% { transform: scaleY(0.75); }
    }
    @keyframes wave-scale-3 {
      0%, 100% { transform: scaleY(0.2); }
      50% { transform: scaleY(0.95); }
    }
    @keyframes pomodoro-countdown {
      0% { stroke-dashoffset: 283; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }
    @keyframes rotate-grid {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes scanline-opacity {
      0%, 100% { opacity: 0.1; }
      50% { opacity: 0.4; }
    }

    /* Animation Classes */
    .anim-pulse {
      animation: pulse 2s infinite ease-in-out;
    }
    .anim-laser {
      animation: laser-move 3.5s infinite ease-in-out;
    }
    .anim-wave-1 {
      animation: wave-scale-1 1.2s infinite ease-in-out;
      transform-origin: bottom;
    }
    .anim-wave-2 {
      animation: wave-scale-2 0.9s infinite ease-in-out;
      transform-origin: bottom;
    }
    .anim-wave-3 {
      animation: wave-scale-3 1.5s infinite ease-in-out;
      transform-origin: bottom;
    }
    .anim-pomo-ring {
      animation: pomodoro-countdown 20s infinite linear;
    }
    .anim-float {
      animation: float 4s infinite ease-in-out;
    }
    .anim-float-delay-1 {
      animation: float 4.5s infinite ease-in-out;
      animation-delay: 0.7s;
    }
    .anim-float-delay-2 {
      animation: float 5s infinite ease-in-out;
      animation-delay: 1.4s;
    }
    .anim-rotate {
      animation: rotate-grid 120s infinite linear;
      transform-origin: 180px 160px;
    }
    .anim-scanline-grid {
      animation: scanline-opacity 3s infinite ease-in-out;
    }
  </style>

  <!-- Background Base -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" />
  
  <!-- Glowing Background Orbs -->
  <rect width="100%" height="100%" fill="url(#glow-indigo)" />
  <rect width="100%" height="100%" fill="url(#glow-violet)" />

  <!-- Animated Background Tech Grid (Subtle) -->
  <g opacity="0.04" class="anim-scanline-grid">
    <path d="M 0,20 L 800,20 M 0,40 L 800,40 M 0,60 L 800,60 M 0,80 L 800,80 M 0,100 L 800,100 M 0,120 L 800,120 M 0,140 L 800,140 M 0,160 L 800,160 M 0,180 L 800,180 M 0,200 L 800,200 M 0,220 L 800,220 M 0,240 L 800,240 M 0,260 L 800,260 M 0,280 L 800,280 M 0,300 L 800,300" stroke="#ffffff" stroke-width="1" />
    <path d="M 40,0 L 40,320 M 80,0 L 80,320 M 120,0 L 120,320 M 160,0 L 160,320 M 200,0 L 200,320 M 240,0 L 240,320 M 280,0 L 280,320 M 320,0 L 320,320 M 360,0 L 360,320 M 400,0 L 400,320 M 440,0 L 440,320 M 480,0 L 480,320 M 520,0 L 520,320 M 560,0 L 560,320 M 600,0 L 600,320 M 640,0 L 640,320 M 680,0 L 680,320 M 720,0 L 720,320 M 760,0 L 760,320" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Decorative Abstract Geometric Network on the Left -->
  <g class="anim-rotate" opacity="0.12">
    <circle cx="180" cy="160" r="100" fill="none" stroke="#6366f1" stroke-width="1" stroke-dasharray="4 8" />
    <circle cx="180" cy="160" r="130" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="10 15" />
    <circle cx="180" cy="160" r="160" fill="none" stroke="#ec4899" stroke-width="0.5" />
    <line x1="180" y1="30" x2="180" y2="290" stroke="#6366f1" stroke-width="0.5" stroke-dasharray="2 4" />
    <line x1="50" y1="160" x2="310" y2="160" stroke="#6366f1" stroke-width="0.5" stroke-dasharray="2 4" />
  </g>

  <!-- Left Side: Brand Identity -->
  <g transform="translate(60, 0)">
    <!-- Calendar/Academic Icon -->
    <g transform="translate(0, 70)" filter="drop-shadow(0 4px 12px rgba(99, 102, 241, 0.4))">
      <rect x="0" y="0" width="48" height="48" rx="10" fill="#4f46e5" />
      <!-- Calendar Grid Visual inside Icon -->
      <rect x="8" y="14" width="32" height="26" rx="4" fill="none" stroke="#ffffff" stroke-width="2.5" />
      <line x1="8" y1="22" x2="40" y2="22" stroke="#ffffff" stroke-width="2" />
      <!-- Binder Rings -->
      <line x1="16" y1="10" x2="16" y2="15" stroke="#a855f7" stroke-width="3.5" stroke-linecap="round" />
      <line x1="32" y1="10" x2="32" y2="15" stroke="#a855f7" stroke-width="3.5" stroke-linecap="round" />
      <!-- Small Pencil / Sparkle -->
      <circle cx="28" cy="30" r="3" fill="#ec4899" />
    </g>

    <!-- Main Title -->
    <text x="64" y="112" class="title-text">Planly</text>
    
    <!-- Version Pill -->
    <g transform="translate(216, 81)">
      <rect x="0" y="0" width="54" height="20" rx="10" fill="#2e1b4e" stroke="#7c3aed" stroke-width="1" />
      <text x="27" y="14" text-anchor="middle" class="version-badge">v1.0.0</text>
    </g>

    <!-- Subtitle Description -->
    <text x="0" y="152" class="subtitle-text">Ruang Kerja Akademik Mahasiswa &amp; Asisten AI</text>
    <text x="0" y="174" font-family="'Inter', sans-serif" font-size="12" fill="#64748b" font-weight="400">
      Sistem manajemen jadwal, tugas, biometri presensi, dan RAG chatbot pintar.
    </text>

    <!-- Tech Badges visual (Vite • React • Laravel • Gemini) -->
    <g transform="translate(0, 205)">
      <!-- Vite badge -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="45" height="18" rx="4" fill="#1e1b4b" stroke="#4f46e5" stroke-width="0.75" />
        <text x="22.5" y="13" text-anchor="middle" font-family="'Inter', sans-serif" font-size="9" font-weight="700" fill="#818cf8">Vite</text>
      </g>
      <!-- React badge -->
      <g transform="translate(50, 0)">
        <rect x="0" y="0" width="50" height="18" rx="4" fill="#0c1d32" stroke="#00d8ff" stroke-width="0.75" />
        <text x="25" y="13" text-anchor="middle" font-family="'Inter', sans-serif" font-size="9" font-weight="700" fill="#00d8ff">React</text>
      </g>
      <!-- Laravel badge -->
      <g transform="translate(105, 0)">
        <rect x="0" y="0" width="58" height="18" rx="4" fill="#2d1316" stroke="#ff2d20" stroke-width="0.75" />
        <text x="29" y="13" text-anchor="middle" font-family="'Inter', sans-serif" font-size="9" font-weight="700" fill="#f87171">Laravel</text>
      </g>
      <!-- Gemini badge -->
      <g transform="translate(168, 0)">
        <rect x="0" y="0" width="60" height="18" rx="4" fill="#1b1230" stroke="#8e75c2" stroke-width="0.75" />
        <text x="30" y="13" text-anchor="middle" font-family="'Inter', sans-serif" font-size="9" font-weight="700" fill="#c084fc">Gemini</text>
      </g>
    </g>
  </g>

  <!-- Right Side: 3 Feature Widgets (Floating & CSS Animated) -->

  <!-- WIDGET 1: POMODORO FOCUS TIMER -->
  <g transform="translate(435, 45)" class="anim-float">
    <!-- Card Glass Background -->
    <rect width="105" height="110" rx="16" fill="#111322" fill-opacity="0.7" stroke="#312e81" stroke-width="1.5" />
    <rect width="105" height="110" rx="16" fill="none" stroke="#4f46e5" stroke-width="1" stroke-opacity="0.3" />
    
    <!-- Widget Title -->
    <text x="52.5" y="22" text-anchor="middle" class="widget-title">POMODORO</text>
    
    <!-- Pomodoro Circular Progress -->
    <g transform="translate(52.5, 62)">
      <!-- BG Ring -->
      <circle r="22" fill="none" stroke="#1e1e38" stroke-width="3" />
      <!-- Animated Active Ring -->
      <circle r="22" fill="none" stroke="url(#accent-grad)" stroke-width="3" 
              stroke-dasharray="138" stroke-dashoffset="40" stroke-linecap="round"
              transform="rotate(-90)" />
      <!-- Pulsing Center Dot -->
      <circle r="4" fill="#ec4899" class="anim-pulse" />
    </g>
    
    <!-- Timer text -->
    <text x="52.5" y="100" text-anchor="middle" class="widget-value" fill="#ec4899">21:04</text>
  </g>

  <!-- WIDGET 2: BIOMETRIC FACE SCANNER -->
  <g transform="translate(555, 125)" class="anim-float-delay-1">
    <!-- Card Glass Background -->
    <rect width="105" height="115" rx="16" fill="#0d151e" fill-opacity="0.75" stroke="#065f46" stroke-width="1.5" />
    <rect width="105" height="115" rx="16" fill="none" stroke="#10b981" stroke-width="1" stroke-opacity="0.3" />

    <!-- Widget Title -->
    <text x="52.5" y="20" text-anchor="middle" class="widget-title" fill="#a7f3d0">BIOMETRIC</text>
    
    <!-- Scanner Visualizer Area -->
    <g transform="translate(22, 28)">
      <!-- Face Frame Border -->
      <rect width="60" height="60" rx="10" fill="#061512" stroke="#0f766e" stroke-width="1.5" stroke-dasharray="6 3" />
      
      <!-- Inside Face Silhouette -->
      <path d="M 30,12 C 22,12 18,18 18,25 C 18,34 22,39 24,42 C 25,43 27,47 25,49 L 35,49 C 33,47 35,43 36,42 C 38,39 42,34 42,25 C 42,18 38,12 30,12 Z" fill="none" stroke="#14b8a6" stroke-width="1.5" stroke-opacity="0.5" />
      
      <!-- Nodes / Biometric Points -->
      <circle cx="30" cy="18" r="2.5" fill="#34d399" />
      <circle cx="24" cy="26" r="2" fill="#34d399" />
      <circle cx="36" cy="26" r="2" fill="#34d399" />
      <circle cx="30" cy="32" r="2" fill="#34d399" />
      <circle cx="27" cy="40" r="2" fill="#34d399" />
      <circle cx="33" cy="40" r="2" fill="#34d399" />
      <path d="M 24,26 L 30,18 L 36,26 L 30,32 L 24,26 M 27,40 L 30,32 L 33,40" stroke="#0d9488" stroke-width="0.75" fill="none" stroke-opacity="0.6" />
      
      <!-- Animated Scan Line -->
      <g class="anim-laser">
        <line x1="4" y1="5" x2="56" y2="5" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" filter="drop-shadow(0 0 4px #10b981)" />
      </g>
    </g>

    <!-- Scan Status Label -->
    <text x="52.5" y="103" text-anchor="middle" class="widget-value" font-size="11">MATCH: 98%</text>
  </g>

  <!-- WIDGET 3: GEMINI AI AUDIO COMPANION -->
  <g transform="translate(675, 30)" class="anim-float-delay-2">
    <!-- Card Glass Background -->
    <rect width="105" height="120" rx="16" fill="#131024" fill-opacity="0.7" stroke="#581c87" stroke-width="1.5" />
    <rect width="105" height="120" rx="16" fill="none" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.3" />

    <!-- Widget Title -->
    <text x="52.5" y="22" text-anchor="middle" class="widget-title" fill="#ddd6fe">GEMINI AI</text>
    
    <!-- Sparkle/AI Icon Glowing -->
    <g transform="translate(42.5, 32)">
      <path d="M 10,0 L 13,7 L 20,10 L 13,13 L 10,20 L 7,13 L 0,10 L 7,7 Z" fill="url(#accent-grad)" class="anim-pulse" />
    </g>

    <!-- Audio Waveforms -->
    <g transform="translate(22, 90)">
      <!-- Wave 1 -->
      <rect x="5" y="-25" width="4" height="25" rx="2" fill="#c084fc" class="anim-wave-1" />
      <!-- Wave 2 -->
      <rect x="13" y="-35" width="4" height="35" rx="2" fill="#8b5cf6" class="anim-wave-2" />
      <!-- Wave 3 -->
      <rect x="21" y="-45" width="4" height="45" rx="2" fill="url(#accent-grad)" class="anim-wave-3" />
      <!-- Wave 4 -->
      <rect x="29" y="-30" width="4" height="30" rx="2" fill="#a855f7" class="anim-wave-1" />
      <!-- Wave 5 -->
      <rect x="37" y="-40" width="4" height="40" rx="2" fill="#c084fc" class="anim-wave-2" />
      <!-- Wave 6 -->
      <rect x="45" y="-20" width="4" height="20" rx="2" fill="#e9d5ff" class="anim-wave-3" />
    </g>
    
    <!-- Status Text -->
    <text x="52.5" y="108" text-anchor="middle" class="widget-value" fill="#a855f7" font-size="10">RAG ACTIVE</text>
  </g>

  <!-- Connective Dots / Network Lines Between Widgets -->
  <g stroke="#312e81" stroke-width="1" opacity="0.3" fill="none">
    <path d="M 540,100 L 607,125" />
    <path d="M 660,182 L 675,120" />
    <path d="M 540,65 L 675,65" />
  </g>
</svg>
